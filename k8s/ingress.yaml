apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: picme-ingress
  annotations:
    kubernetes.io/ingress.class: "traefik"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: "web,websecure"
spec:
  tls:
    - hosts:
        - picme225.site
        - www.picme225.site
      secretName: picme225-tls
  rules:
    - host: picme225.site
      http:
        paths:
          - path: /socket.io/
            pathType: Prefix
            backend:
              service:
                name: nodejs-service
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: laravel-service
                port:
                  number: 80
    - host: www.picme225.site
      http:
        paths:
          - path: /socket.io/
            pathType: Prefix
            backend:
              service:
                name: nodejs-service
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: laravel-service
                port:
                  number: 80
    # Catch-all pour accès par IP (debug uniquement)
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: laravel-service
                port:
                  number: 80
